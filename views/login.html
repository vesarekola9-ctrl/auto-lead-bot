<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin login</title>
  <style>
    body{font-family:system-ui,Segoe UI,Arial;margin:0;display:grid;place-items:center;height:100vh;background:#f6f6f6}
    .c{background:#fff;padding:22px;border-radius:16px;box-shadow:0 16px 40px rgba(0,0,0,.12);width:340px}
    input{width:100%;padding:12px;border:1px solid #e5e5e5;border-radius:12px;margin-top:8px}
    button{width:100%;padding:12px;border:0;border-radius:12px;margin-top:12px;background:#111;color:#fff;font-weight:800;cursor:pointer}
    .t{font-weight:900;font-size:18px}
  </style>
</head>
<body>
  <form class="c" method="post" action="/admin/login">
    <div class="t">Auto Lead Bot — Admin</div>
    <input name="user" placeholder="Käyttäjä" />
    <input name="pass" type="password" placeholder="Salasana" />
    <button>Kirjaudu</button>
  </form>
</body>
</html>
