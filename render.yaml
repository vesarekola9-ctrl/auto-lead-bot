services:
  - type: web
    name: auto-lead-bot
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "3000"
      - key: BASE_URL
        value: "https://YOUR-RENDER-URL"
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: "admin"
      - key: ADMIN_PASS
        value: "change-this"
      - key: DEFAULT_NOTIFY_EMAIL
        value: "you@domain.com"
